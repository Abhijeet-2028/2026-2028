<!DOCTYPE html>
<html>
<head>
<title>Calculator</title>
<style>
body {
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.calculator {
    background: #111;
    padding: 20px;
    border-radius: 20px;
}
#display {
    width: 100%;
    height: 60px;
    font-size: 30px;
    text-align: right;
    margin-bottom: 10px;
    border: none;
    background: black;
    color: white;
}
button {
    width: 60px;
    height: 60px;
    margin: 5px;
    font-size: 20px;
    border: none;
    border-radius: 50%;
    cursor: pointer;
}
.num { background: #333; color: white; }
.op { background: orange; color: white; }
.clear { background: red; color: white; }
</style>
</head>

<body>
<div class="calculator">
    <input type="text" id="display" disabled>

    <div>
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="op" onclick="append('/')">/</button>
        <button class="op" onclick="append('*')">*</button>
        <button class="op" onclick="append('-')">-</button>
    </div>

    <div>
        <button class="num" onclick="append('7')">7</button>
        <button class="num" onclick="append('8')">8</button>
        <button class="num" onclick="append('9')">9</button>
        <button class="op" onclick="append('+')">+</button>
    </div>

    <div>
        <button class="num" onclick="append('4')">4</button>
        <button class="num" onclick="append('5')">5</button>
        <button class="num" onclick="append('6')">6</button>
        <button class="op" onclick="calculate()">=</button>
    </div>

    <div>
        <button class="num" onclick="append('1')">1</button>
        <button class="num" onclick="append('2')">2</button>
        <button class="num" onclick="append('3')">3</button>
    </div>

    <div>
        <button class="num" onclick="append('0')">0</button>
        <button class="num" onclick="append('.')">.</button>
    </div>
</div>

<script>
function append(value) {
    document.getElementById("display").value += value;
}

function clearDisplay() {
    document.getElementById("display").value = "";
}

function calculate() {
    let result = eval(document.getElementById("display").value);
    document.getElementById("display").value = result;
}
</script>
</body>
</html>
